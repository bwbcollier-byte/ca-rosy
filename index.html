<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Rosy Recruits — Where Floral Excellence Meets Efficiency</title>
  <meta name="description" content="Post your first gig in 60 seconds. Vendors crew up, workers find work, Stripe handles the money. Built in Chicago for floral event teams across Chicagoland." />
  <meta name="theme-color" content="#E8473F" />
  <link rel="stylesheet" href="project/styles.css" />
  <link rel="icon" type="image/avif" href="project/assets/logo.avif" />
  <link rel="apple-touch-icon" href="project/assets/logo.avif" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <script>
    // Public client config. Google Maps browser key is HTTP-referrer restricted
    // in Google Cloud so it's safe to ship inline (same security model as the
    // Supabase anon key). When this is non-empty, AddressInput swaps the plain
    // text field for Places Autocomplete.
    window.ROSY_CONFIG = window.ROSY_CONFIG || {};
    window.ROSY_CONFIG.googleMapsApiKey = 'AIzaSyDTrcAP1SK1esPUU0IZZTqS07TXqPeYBeg';

    // Load Google Maps Places lib (async) once on boot so AddressInput can use it.
    (function loadMaps() {
      var key = window.ROSY_CONFIG && window.ROSY_CONFIG.googleMapsApiKey;
      if (!key) return;
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(key) + '&libraries=places&loading=async&v=weekly';
      s.async = true; s.defer = true;
      s.onload = function () { window.__rosyMapsReady = true; window.dispatchEvent(new CustomEvent('rosy:google-maps-ready')); };
      s.onerror = function () { console.warn('Google Maps failed to load'); };
      document.head.appendChild(s);
    })();
  </script>
  <script>
    // Dev-only cache-buster: append ?v=<now> to every type="text/babel" src
    // so the in-browser Babel transformer always fetches fresh JSX during development.
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('script[type="text/babel"][src]').forEach(s => {
        const sep = s.src.includes('?') ? '&' : '?';
        s.src = s.src + sep + 'v=' + Date.now();
      });
    }, { capture: true });

    // Capture the PWA install prompt the moment Chrome fires it, stash it on window so
    // the "Install app" button in marketing_pages.jsx can fire it later.
    window.__pwaInstallEvent = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.__pwaInstallEvent = e;
      window.dispatchEvent(new CustomEvent('rosy:pwa-installable'));
    });
    window.addEventListener('appinstalled', () => {
      window.__pwaInstallEvent = null;
      window.dispatchEvent(new CustomEvent('rosy:pwa-installed'));
    });

    // Register the service worker (offline shell + install support).
    // Service worker disabled: it was an extra cache layer with no real PWA
    // benefit, and admins kept seeing stale JSX on other tabs after changes.
    // Aggressively unregister any leftover SW + clear its caches so existing
    // users get a clean slate after this deploy.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister().catch(()=>{})));
      try { caches.keys().then(keys => keys.forEach(k => caches.delete(k).catch(()=>{}))); } catch (e) {}
    }
    if (false && 'serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => console.warn('SW registration failed:', err));
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Cache-bust JSX on every deploy. We probe the current JSX file's
       ETag/Last-Modified once, then load all JSX files with that stamp as a
       query param. New deploy = different stamp = fresh fetch.
       Falls back to a per-session timestamp if the probe fails. -->
  <script>(function(){
    var bust = String(Date.now());
    try {
      var x = new XMLHttpRequest();
      x.open('HEAD', 'project/src/app.jsx', false);
      x.send();
      var lm = x.getResponseHeader('Last-Modified') || x.getResponseHeader('ETag');
      if (lm) bust = lm.replace(/[^A-Za-z0-9]/g,'').slice(0,24);
    } catch(e) {}
    window.__ROSY_BUST = bust;
    ['icons','data','supabase_client','components','screen_dashboards','screen_events','screen_gigs','screen_admin','screen_misc','marketing_pages','extras','form_helpers','admin_extras','tweaks','app'].forEach(function(name){
      var s = document.createElement('script');
      s.type = 'text/babel';
      s.src = 'project/src/' + name + '.jsx?v=' + bust;
      s.dataset.presets = 'react';
      s.async = false;
      document.head.appendChild(s);
    });
  })();</script>
</body>
</html>
